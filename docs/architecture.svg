<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" font-family="'Segoe UI',-apple-system,'Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#7a8aa0"/>
    </marker>
    <linearGradient id="ds" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f3a5f"/><stop offset="1" stop-color="#152b47"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f5f"/><stop offset="1" stop-color="#2a2147"/>
    </linearGradient>
    <linearGradient id="fe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14402f"/><stop offset="1" stop-color="#0f3326"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="760" height="600" fill="#0e1422"/>
  <text x="380" y="34" fill="#e8eef7" font-size="20" font-weight="800" text-anchor="middle">竞价选股系统 · 静态数据 + 实时 API 双模式架构</text>
  <text x="380" y="54" fill="#7a8aa0" font-size="12" text-anchor="middle">EdgeOne 静态托管秒开 · FastAPI 实时补充盘中数据 · DataService 统一封装 AkShare</text>

  <!-- 数据源 -->
  <rect x="290" y="70" width="180" height="44" rx="10" fill="#243b5e" stroke="#3f5d86"/>
  <text x="380" y="92" fill="#cfe0f5" font-size="13" font-weight="700" text-anchor="middle">AkShare 数据源</text>
  <text x="380" y="107" fill="#8aa0bf" font-size="10" text-anchor="middle">东财 / 新浪（自动回退）</text>

  <!-- DataService -->
  <rect x="270" y="140" width="220" height="52" rx="10" fill="url(#ds)" stroke="#4f7bb0" stroke-width="1.5"/>
  <text x="380" y="163" fill="#eaf2ff" font-size="14" font-weight="800" text-anchor="middle">DataService（唯一 import akshare）</text>
  <text x="380" y="181" fill="#9fc0e8" font-size="10.5" text-anchor="middle">缓存 · 东财→新浪回退 · 重试 · force_sina</text>
  <line x1="380" y1="114" x2="380" y2="140" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- 左：生成管线 -->
  <rect x="40" y="220" width="200" height="58" rx="10" fill="#1b2940" stroke="#34507a"/>
  <text x="140" y="244" fill="#cfe0f5" font-size="12.5" font-weight="700" text-anchor="middle">生成管线（本机/CI）</text>
  <text x="140" y="262" fill="#8aa0bf" font-size="10" text-anchor="middle">generate_results / auto_tune</text>
  <text x="140" y="274" fill="#8aa0bf" font-size="10" text-anchor="middle">run_backtest / snapshot</text>
  <line x1="320" y1="166" x2="240" y2="220" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- 静态 JSON -->
  <rect x="40" y="306" width="200" height="50" rx="10" fill="#16314a" stroke="#2f5e7a"/>
  <text x="140" y="328" fill="#bfe6ff" font-size="12.5" font-weight="700" text-anchor="middle">静态 JSON（data/*.json）</text>
  <text x="140" y="345" fill="#8aa0bf" font-size="10" text-anchor="middle">每日 09:26 / 定时生成</text>
  <line x1="140" y1="278" x2="140" y2="306" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- EdgeOne -->
  <rect x="40" y="392" width="200" height="50" rx="10" fill="url(#fe)" stroke="#2f9e6b"/>
  <text x="140" y="414" fill="#d6ffe9" font-size="12.5" font-weight="700" text-anchor="middle">EdgeOne Pages 静态站</text>
  <text x="140" y="431" fill="#8fd9b4" font-size="10" text-anchor="middle">托管 index.html + assets + data</text>
  <line x1="140" y1="356" x2="140" y2="392" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- 右：FastAPI -->
  <rect x="520" y="220" width="200" height="58" rx="10" fill="url(#api)" stroke="#7a5fb0" stroke-width="1.5"/>
  <text x="620" y="244" fill="#ece4ff" font-size="12.5" font-weight="700" text-anchor="middle">FastAPI 实时 API</text>
  <text x="620" y="262" fill="#c4b0ef" font-size="10" text-anchor="middle">7 端点 + 预留扩展</text>
  <text x="620" y="274" fill="#c4b0ef" font-size="10" text-anchor="middle">CORS · 同源托管前端</text>
  <line x1="400" y1="166" x2="600" y2="220" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- 端点 -->
  <rect x="520" y="306" width="200" height="92" rx="10" fill="#221a36" stroke="#5a4a8a"/>
  <text x="532" y="326" fill="#d8ccff" font-size="10.5" font-weight="700">/api/market · /api/recommend</text>
  <text x="532" y="343" fill="#b8a8e0" font-size="10">/api/history · /api/backtest</text>
  <text x="532" y="360" fill="#b8a8e0" font-size="10">/api/hot-sector · /api/stock/{code}</text>
  <text x="532" y="377" fill="#b8a8e0" font-size="10">/api/config · 预留: strategies/</text>
  <text x="532" y="392" fill="#b8a8e0" font-size="10">analysis/push/trade</text>
  <line x1="620" y1="278" x2="620" y2="306" stroke="#7a8aa0" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- 前端 SPA -->
  <rect x="270" y="470" width="220" height="64" rx="12" fill="#10243c" stroke="#3f7bb0" stroke-width="1.5"/>
  <text x="380" y="494" fill="#eaf2ff" font-size="13.5" font-weight="800" text-anchor="middle">前端 SPA（双模式）</text>
  <text x="380" y="512" fill="#9fc0e8" font-size="10.5" text-anchor="middle">静态优先加载 data/*.json → 秒开</text>
  <text x="380" y="526" fill="#9fc0e8" font-size="10.5" text-anchor="middle">→ 经 /api 每 20s 实时刷新行情/报价/板块/资金流</text>

  <!-- SPA 连接 -->
  <line x1="140" y1="442" x2="300" y2="478" stroke="#2f9e6b" stroke-width="1.6" marker-end="url(#arw)"/>
  <line x1="620" y1="398" x2="610" y2="476" stroke="#7a5fb0" stroke-width="1.6" marker-end="url(#arw)"/>

  <!-- 预留扩展框 -->
  <rect x="520" y="470" width="200" height="64" rx="10" fill="#1a1f33" stroke="#3a4566" stroke-dasharray="5 4"/>
  <text x="620" y="492" fill="#aab6cc" font-size="11" font-weight="700" text-anchor="middle">预留模块（模块化）</text>
  <text x="620" y="510" fill="#8a96ad" font-size="10" text-anchor="middle">AI 分析 · 多策略引擎</text>
  <text x="620" y="524" fill="#8a96ad" font-size="10" text-anchor="middle">消息推送 · 实盘交易</text>
  <line x1="620" y1="398" x2="620" y2="470" stroke="#3a4566" stroke-width="1.2" stroke-dasharray="4 4"/>

  <text x="380" y="566" fill="#5a6b85" font-size="10.5" text-anchor="middle">禁止页面/策略直接调用 AkShare：所有行情必须经 DataService；实时 API 不可达时前端自动降级为静态并标注状态</text>
</svg>
