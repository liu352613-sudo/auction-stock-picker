<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>竞价选股 - 每日策略推荐</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#f5f6f8;color:#1a1a2e;min-height:100vh;font-size:14px;
}

/* ===== Top Bar ===== */
.topbar{
  background:#fff;border-bottom:1px solid #ececec;
  padding:10px 22px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.brand{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:800;color:#c0392b;cursor:pointer}
.brand-icon{
  width:32px;height:32px;border-radius:7px;
  background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;
  font-size:15px;font-weight:bold;display:flex;align-items:center;justify-content:center;
}
.search-bar{flex:1;max-width:340px;margin:0 22px;position:relative}
.search-bar input{
  width:100%;padding:7px 14px 7px 32px;border:1px solid #e0e0e0;border-radius:18px;
  font-size:13px;background:#f7f7f7;outline:none;transition:.2s;
}
.search-bar input:focus{border-color:#c0392b;background:#fff}
.search-bar .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#bbb;font-size:13px}
/* ===== Index Bar (指数栏) ===== */
.idx-bar{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.idx-card{
  flex:1;min-width:130px;background:#fff;border-radius:10px;padding:14px 16px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);text-align:center;transition:.15s;
}
.idx-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.idx-name{font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.idx-val{font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:2px}
.idx-diff{font-size:13px;font-weight:600}
.idx-up{color:#e74c3c}.idx-down{color:#27ae60}

/* ===== Layout ===== */
.main-layout{display:flex;max-width:1480px;margin:0 auto;padding:16px;gap:16px}
.sidebar{
  width:160px;flex-shrink:0;background:#fff;border-radius:10px;padding:10px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.05);align-self:flex-start;position:sticky;top:58px;
}
.side-item{
  padding:10px 16px;cursor:pointer;font-size:13px;color:#555;
  display:flex;justify-content:space-between;align-items:center;
  transition:.15s;border-left:3px solid transparent;
}
.side-item:hover{background:#f7f8fa;color:#222}
.side-item.active{background:#fef6f5;color:#c0392b;border-left-color:#c0392b;font-weight:600}
.side-badge{background:#eee;color:#888;font-size:10.5px;padding:1px 6px;border-radius:8px;font-weight:500}
.side-item.active .side-badge{background:#fdd;color:#c0392b}
.content{flex:1;min-width:0}

/* page sections */
.page-section{display:none}
.page-section.active{display:block}

/* ===== npcs1983 MARKET BANNER ===== */
.mkt-strip{
  display:flex;align-items:center;gap:18px;background:#fff;border-radius:10px;
  padding:12px 18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap;
}
.mkt-temp{font-size:22px;font-weight:800;color:#c0392b}
.mkt-temp small{font-size:12px;color:#999;font-weight:400;margin-left:4px}
.mkt-meta{font-size:12.5px;color:#888;line-height:1.5}
.mkt-upd{margin-left:auto;font-size:12.5px;color:#999}
.mkt-upd b{color:#c0392b;font-size:14px}

/* ===== npcs1983 MAIN TABLE ===== */
.panel{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid #f0f0f0;
}
.panel-title{font-size:15px;font-weight:700}
.panel-sub{font-size:12px;color:#999}

.npcs-table{width:100%;border-collapse:collapse;font-size:13px}
.npcs-table thead th{
  background:#fafafa;padding:11px 14px;text-align:left;font-weight:600;color:#888;
  border-bottom:2px solid #eee;font-size:12.5px;white-space:nowrap;
}
.npcs-table tbody td{
  padding:12px 14px;border-bottom:1px solid #f5f5f5;color:#333;white-space:nowrap;
}
.npcs-table tbody tr:hover{background:#fafcff}
.rk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  border-radius:50%;font-size:12px;font-weight:700;background:#f0f0f0;color:#999}
.rk.top{background:#c0392b;color:#fff}
.stk-name{font-weight:700;color:#1a1a2e}
.stk-code{color:#aaa;font-size:11.5px;margin-left:5px;font-weight:400}
.sector{display:inline-block;padding:1px 9px;border-radius:10px;background:#eef2f7;color:#5a6b7b;font-size:11.5px}
.price{font-weight:700;font-size:14px}
.chg{font-weight:700;font-size:13px}
.score{font-weight:800;font-size:14px;color:#e67e22}
.up{color:#e74c3c}.down{color:#27ae60}.flat{color:#888}
.reco{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11.5px;font-weight:600}
.reco-hot{background:#fde8e8;color:#c0392b}
.reco-mid{background:#fff3e0;color:#e67e22}
.reco-low{background:#e8f0fe;color:#2a6fdb}
.reco-no{background:#eee;color:#999}
.turnover{color:#555}
.btn-detail{
  padding:3px 12px;border:1px solid #ddd;border-radius:12px;font-size:11.5px;
  cursor:pointer;background:#fff;color:#666;transition:.15s;
}
.btn-detail:hover{border-color:#c0392b;color:#c0392b}

/* ===== Temperature page ===== */
.temp-toolbar{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;background:#fff;
  padding:12px 18px;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap;
}
.temp-mode-btn{
  padding:6px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
  border:1px solid #ddd;background:#fff;color:#555;transition:.15s;
}
.temp-mode-btn.active{background:#e74c3c;color:#fff;border-color:#e74c3c}
.temp-date-input{padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none;width:140px}
.temp-filter{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#666}
.temp-filter select{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12.5px;outline:none}
.theme-toggle{margin-left:auto}
.theme-btn{padding:4px 12px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:.15s}
.theme-btn.active{border-color:#c0392b;color:#c0392b;background:#fef6f5}
.chart-container{background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.chart-title{font-size:15px;font-weight:700;margin-bottom:4px}
.chart-legend{display:flex;gap:16px;font-size:11.5px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.chart-canvas{width:100%;height:280px}
.idx-table-wrap{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.idx-table{width:100%;border-collapse:collapse;font-size:13px}
.idx-table th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;color:#888;border-bottom:2px solid #eee;font-size:12px;cursor:pointer}
.idx-table td{padding:10px 12px;border-bottom:1px solid #f5f5f5;color:#444}
.idx-table tr:hover td{background:#fafafa}
.status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11.5px;font-weight:500}
.status-natural{background:#e8f5e9;color:#2e7d32}.status-spring{background:#fce4ec;color:#c62828}
.status-fallback{background:#fff3e0;color:#e65100}.status-rebound{background:#e3f2fd;color:#1565c0}

/* ===== Strategy picker cards (策略选股 detailed) ===== */
.pick-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1100px){.pick-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.pick-grid{grid-template-columns:1fr}}
.pick-card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #eee;transition:.15s}
.pick-card:hover{box-shadow:0 6px 18px rgba(0,0,0,.08);border-color:#ddd}
.pick-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pick-name{font-size:15px;font-weight:700}
.pick-code{font-size:11.5px;color:#aaa;margin-left:5px}
.pick-row{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.pick-price{font-size:24px;font-weight:700}
.pick-pct{font-size:13.5px;font-weight:700}
.pick-detail{display:flex;gap:16px;font-size:12px;color:#888;padding-top:7px;border-top:1px solid #f3f3f3}
.risk-box{margin-top:8px;padding:7px 9px;border-radius:6px;background:linear-gradient(135deg,#fff5f5,#ffeded);border:1px solid #ffdada;font-size:11.5px;line-height:1.6}
.risk-tag{display:inline-block;color:#c0392b;font-weight:700;margin-right:4px}
.risk-text{color:#a00}

.status-msg{padding:30px;text-align:center;color:#888;font-size:15px}
.status-info{background:#ebf5ff;color:#2980b9;padding:13px 18px;border-radius:10px;margin-bottom:14px;font-size:13.5px}
.status-warn{background:#fffaf0;color:#d35400;padding:13px 18px;border-radius:10px;margin-bottom:14px;font-size:13.5px}
.footer-risk{background:#fff;border-radius:10px;padding:14px 18px;margin-top:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);font-size:12px;color:#999;line-height:1.7;border-left:4px solid #e74c3c}
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <div class="brand" onclick="switchPage('overview')">
    <div class="brand-icon">竞</div><span>竞价选股</span>
  </div>
  <div class="search-bar"><span class="si">🔍</span>
    <input type="text" placeholder="请输入股票名称或代码" />
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main-layout">
<aside class="sidebar" id="sidebar"></aside>
<main class="content">

<!-- ==================== 概览 / 首页（npcs1983 主表） ==================== -->
<section class="page-section active" id="page-overview">
  <div class="idx-bar" id="idxBar"></div>
  <div class="mkt-strip" id="mktStrip"></div>
  <div class="panel">
    <div class="panel-head">
      <span class="panel-title">📊 竞价精选排行</span>
      <span class="panel-sub" id="ovSub"></span>
    </div>
    <table class="npcs-table" id="npcsTable">
      <thead><tr>
        <th>排名</th><th>名称(代码)</th><th>板块</th><th>现价</th><th>涨跌幅</th><th>评分</th><th>建议</th><th>交易额</th><th>操作</th>
      </tr></thead>
      <tbody id="npcsBody"></tbody>
    </table>
  </div>
  <div class="footer-risk">
    ⚠️ 风险提示：以上推荐仅基于集合竞价数据量化筛选，不构成任何投资建议。市场有风险，投资需谨慎。
    数据仅供参考，请结合市场环境、个人风险承受能力及投资目标审慎决策。过往表现不代表未来收益。
  </div>
</section>

<!-- ==================== 市场温度计 ==================== -->
<section class="page-section" id="page-temp">
  <div class="temp-toolbar">
    <button class="temp-mode-btn active" onclick="setTempMode('list')">列表</button>
    <button class="temp-mode-btn" onclick="setTempMode('heatmap')">热力图</button>
    <input type="date" class="temp-date-input" value="2026-07-10" />
    <div class="temp-filter">指数类型
      <select><option>A股指数</option></select> 区间涨跌
      <select><option selected>3日涨幅</option><option>5日涨幅</option><option>10日涨幅</option></select> 趋势状态
      <select><option selected>不限</option><option>自然反弹</option><option>次级反弹</option><option>自然回落</option><option>次级回落</option><option>自然回音</option></select>
    </div>
    <div class="theme-toggle">
      <button class="theme-btn active" onclick="setColorMode('light')">浅色</button>
      <button class="theme-btn" onclick="setColorMode('dark')">深色</button>
    </div>
  </div>
  <div class="chart-container">
    <div class="chart-title">众数基础指数</div>
    <div class="chart-legend">
      <span><i class="legend-dot" style="background:#26a69a"></i>大次总</span>
      <span><i class="legend-dot" style="background:#ec407a"></i>众数基础指数</span>
      <span><i class="legend-dot" style="background:#ffa726"></i>—</span>
    </div>
    <canvas class="chart-canvas" id="tempChart"></canvas>
  </div>
  <div class="idx-table-wrap">
    <table class="idx-table" id="idxTable">
      <thead><tr><th>指数</th><th>趋势状态</th><th>自然涨跌 ▲</th><th>水位 ▼</th><th>强弱</th><th>3日涨幅 ▲</th></tr></thead>
      <tbody id="idxTableBody"></tbody>
    </table>
  </div>
</section>

<!-- ==================== 策略选股（详细卡片） ==================== -->
<section class="page-section" id="page-picker">
  <div id="pickerStatus" style="margin-bottom:14px"></div>
  <div id="pickerResult" class="hidden">
    <div class="mkt-strip" id="mktStrip2"></div>
    <div class="pick-grid" id="pickGrid"></div>
    <div class="footer-risk">
      ⚠️ 风险提示：以上推荐仅基于集合竞价数据量化筛选，不构成任何投资建议。市场有风险，投资需谨慎。
    </div>
  </div>
</section>

</main>
</div>

<script>
const DATA_URL="./data/results.json";
const SIDEBAR_ITEMS=[
  {id:"overview",name:"首页",badge:null,icon:"🏠"},
  {id:"picker",name:"策略选股",badge:"HOT",icon:"🎯"},
  {id:"temp",name:"市场温度计",badge:null,icon:"🌡️"},
];
let currentPage="overview";
let appData=null;

function switchPage(id){
  currentPage=id;
  document.querySelectorAll(".page-section").forEach(s=>s.classList.remove("active"));
  const t=document.getElementById("page-"+id); if(t)t.classList.add("active");
  document.querySelectorAll(".side-item").forEach((el,i)=>el.classList.toggle("active",SIDEBAR_ITEMS[i].id===id));
  if(id==="temp"){renderTempChart();renderIdxTable();}
  if(id==="picker"&&appData)renderPicker(appData);
}
function renderSidebar(){
  document.getElementById("sidebar").innerHTML=SIDEBAR_ITEMS.map((it,i)=>
    `<div class="side-item${it.id==='overview'?' active':''}" onclick="switchPage('${it.id}')">${it.icon} ${it.name}${it.badge?`<span class="side-badge">${it.badge}</span>`:''}</div>`
  ).join("");
}

// ---- index bar (指数栏) ----
const IDX_BAR_FALLBACK=[
  {name:"上证指数",val:3996.16,diff:-40.43,pct:"-1.00%"},
  {name:"深证成指",val:15046.67,diff:-352.06,pct:"-2.29%"},
  {name:"创业板指",val:3842.73,diff:-175.44,pct:"-4.37%"},
  {name:"科创50",val:2064.98,diff:-120.85,pct:"-5.53%"},
  {name:"沪深300",val:4780.79,diff:-95.52,pct:"-1.96%"},
];
function renderIdxBar(){
  const data=(appData&&appData.indices)||IDX_BAR_FALLBACK;
  document.getElementById("idxBar").innerHTML=data.map(d=>{
    const cls=d.diff>=0?"idx-up":"idx-down";
    return`<div class="idx-card">
      <div class="idx-name">${d.name}</div>
      <div class="idx-val">${Number(d.val).toFixed(2)}</div>
      <div class="idx-diff ${cls}">${Number(d.diff)>=0?"+":""}${Number(d.diff).toFixed(2)} ${d.pct}</div>
    </div>`;
  }).join("");
}

// ---- helpers ----
function colorClass(v){return v>0?"up":v<0?"down":"flat";}
function fmtChg(v){return (v>0?"+":"")+Number(v).toFixed(2)+"%";}
function fmtTurnover(yuan){
  if(yuan>=1e8)return (yuan/1e8).toFixed(2)+"亿";
  if(yuan>=1e4)return (yuan/1e4).toFixed(2)+"万";
  return yuan.toFixed(0)+"元";
}
function recoClass(d){
  if(d==="强烈推荐")return"reco-hot";
  if(d==="中等")return"reco-mid";
  if(d==="谨慎")return"reco-low";
  return"reco-no";
}

// ---- market strip ----
function renderMktStrip(el,data){
  const t=data.temperature||{};
  el.innerHTML=`
    <div class="mkt-temp">${Number(t.total??0).toFixed(0)}<small>/100 温度</small></div>
    <div class="mkt-meta">等级：<b style="color:#e67e22">${t.level??'-'}</b> ｜ 建议仓位 <b style="color:#27ae60">${t.position??'-'}%</b> ｜ 上涨占比 ${((t.market_pct??0)*100).toFixed(0)}%</div>
    <div class="mkt-upd">实时 <b>${data.update_time??'-'}</b> ｜ 来源：${data.data_source??'AkShare'}</div>`;
}

// ---- npcs main table ----
function renderNpcsTable(data){
  const stocks=data.stocks||[];
  document.getElementById("ovSub").textContent=`共 ${stocks.length} 只 ｜ 生成 ${data.generated_at||'-'}`;
  if(!stocks.length){document.getElementById("npcsBody").innerHTML='<tr><td colspan="9" class="status-msg">暂无符合条件的个股</td></tr>';return;}
  document.getElementById("npcsBody").innerHTML=stocks.map(s=>{
    const cc=colorClass(s.涨跌幅);
    return`<tr>
      <td><span class="rk${s.排名<=3?' top':''}">${s.排名}</span></td>
      <td><span class="stk-name">${s.名称}</span><span class="stk-code">${s.代码}</span></td>
      <td><span class="sector">${s.板块}</span></td>
      <td class="price ${cc}">${Number(s.现价).toFixed(2)}</td>
      <td class="chg ${cc}">${fmtChg(s.涨跌幅)}</td>
      <td class="score">${s.评分}</td>
      <td><span class="reco ${recoClass(s.买入程度)}">${s.建议}</span></td>
      <td class="turnover">${fmtTurnover(s.交易额)}</td>
      <td><button class="btn-detail" onclick="showDetail('${s.代码}')">查看详情</button></td>
    </tr>`;
  }).join("");
}

// ---- picker detailed cards ----
function renderPicker(data){
  renderMktStrip(document.getElementById("mktStrip2"),data);
  const stocks=data.stocks||[];
  if(!stocks.length){document.getElementById("pickGrid").innerHTML='<div class="status-msg">暂无符合条件的个股</div>';return;}
  document.getElementById("pickGrid").innerHTML=stocks.map(s=>{
    const cc=colorClass(s.涨跌幅);
    return`<div class="pick-card">
      <div class="pick-head"><span class="pick-name">${s.名称}<span class="pick-code">${s.代码}</span></span><span class="reco ${recoClass(s.买入程度)}">${s.建议}</span></div>
      <div class="pick-row"><span class="pick-price ${cc}">${Number(s.现价).toFixed(2)}</span><span class="pick-pct ${cc}">${fmtChg(s.涨跌幅)}</span></div>
      <div class="pick-detail"><span>评分 <b style="color:#333">${s.评分}</b></span><span>量比 <b style="color:#333">${s.量比}</b></span><span>板块 <b style="color:#333">${s.板块}</b></span></div>
      <div class="risk-box"><span class="risk-tag">${s.买入程度==='不推荐'?'禁购':'关注'}</span><span class="risk-text">买入 ${s.买入价} ｜ 止盈 ${s.止盈价} ｜ 止损 ${s.止损价} ｜ 交易额 ${fmtTurnover(s.交易额)}</span></div>
    </div>`;
  }).join("");
  document.getElementById("pickerResult").classList.remove("hidden");
}

function showDetail(code){
  const s=(appData.stocks||[]).find(x=>x.代码===code);
  if(!s)return;
  alert(`${s.名称} (${s.代码})\n板块：${s.板块}\n现价：${s.现价} (${fmtChg(s.涨跌幅)})\n动能评分：${s.评分}\n建议：${s.建议}\n买入价：${s.买入价}  止盈：${s.止盈价}  止损：${s.止损价}\n量比：${s.量比}\n交易额：${fmtTurnover(s.交易额)}`);
}

// ---- temp page (chart + index table) ----
function setTempMode(m){document.querySelectorAll('.temp-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));}
function setColorMode(m){document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(m==='light'?'浅色':'深色')));}
function renderTempChart(){
  const c=document.getElementById("tempChart");if(!c)return;
  const ctx=c.getContext("2d");const dpr=window.devicePixelRatio||1;const rect=c.getBoundingClientRect();
  c.width=rect.width*dpr;c.height=rect.height*dpr;ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height,pad={t:20,r:46,b:30,l:50},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);
  const pts=120;let a=[],b=[],cc=[];let v1=0,v2=0,v3=0;
  for(let i=0;i<pts;i++){v1+=(Math.random()-0.48)*8;v1=Math.max(-80,Math.min(120,v1));v2+=(Math.random()-0.45)*6;v2=Math.max(-60,Math.min(100,v2));v3+=(Math.random()-0.5)*4;v3=Math.max(-40,Math.min(60,v3));a.push(v1);b.push(v2);cc.push(v3);}
  ctx.strokeStyle="#f0f0f0";ctx.lineWidth=1;
  for(let i=0;i<=5;i++){const y=pad.t+cH*(1-i/5);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle="#999";ctx.font="11px sans-serif";ctx.textAlign="right";ctx.fillText((i*50-50).toString(),pad.l-6,y+4);}
  ctx.textAlign="center";["2023-07-10","","","","","","","","2026-07-10"].forEach((l,i)=>{ctx.fillText(l,pad.l+(cW*i/8),H-8);});
  function dl(d,col){ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.beginPath();d.forEach((v,i)=>{const x=pad.l+(cW*(i/(d.length-1))),y=pad.t+cH*((50-v)/150);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();}
  dl(cc,"#ffa726");dl(a,"#26a69a");dl(b,"#ec407a");
  const lv=[a[pts-1].toFixed(2),b[pts-1].toFixed(2)+"%",cc[pts-1].toFixed(2)+"%"];
  const rc=[{v:lv[0],c:"#26a69a"},{v:lv[1],c:"#ec407a"},{v:lv[2],c:"#ffa726"}];
  ctx.textAlign="left";rc.forEach((r,i)=>{ctx.fillStyle=r.c;ctx.font="bold 12px sans-serif";ctx.fillText(r.v,W-pad.r+4,pad.t+16+i*18);});
}

async function loadData(){
  showStatus("⏳ 正在加载竞价选股数据…","info");
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now());
