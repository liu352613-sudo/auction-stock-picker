<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>竞价选股系统 - 每日策略推荐</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#f0f2f5;color:#1a1a2e;min-height:100vh;font-size:14px;
}

/* ===== Top Bar ===== */
.topbar{
  background:#fff;border-bottom:1px solid #e8e8e8;
  padding:8px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.brand{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;color:#c0392b;cursor:pointer}
.brand-icon{
  width:30px;height:30px;border-radius:6px;
  background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;
  font-size:14px;font-weight:bold;display:flex;align-items:center;justify-content:center;
}

/* Search bar */
.search-bar{
  flex:1;max-width:360px;margin:0 24px;position:relative;
}
.search-bar input{
  width:100%;padding:7px 14px 7px 34px;border:1px solid #ddd;border-radius:18px;
  font-size:13px;background:#f5f5f5;outline:none;transition:.2s;
}
.search-bar input:focus{border-color:#c0392b;background:#fff}
.search-bar .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#bbb;font-size:14px}

/* Top tags nav */
.top-tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.top-tag{
  padding:4px 12px;border-radius:14px;font-size:12px;cursor:pointer;
  border:1px solid #e0e0e0;background:#fff;color:#666;transition:.15s;white-space:nowrap;
}
.top-tag:hover,.top-tag.active{border-color:#c0392b;color:#c0392b;background:#fef6f5}

/* ===== Main Layout ===== */
.main-layout{display:flex;max-width:1500px;margin:0 auto;padding:16px;gap:16px}

/* Sidebar */
.sidebar{
  width:156px;flex-shrink:0;
  background:#fff;border-radius:10px;padding:10px 0;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
  align-self:flex-start;position:sticky;top:56px;
}
.side-item{
  padding:9px 16px;cursor:pointer;font-size:13px;color:#555;
  display:flex;justify-content:space-between;align-items:center;
  transition:.15s;border-left:3px solid transparent;
}
.side-item:hover{background:#f7f8fa;color:#222}
.side-item.active{background:#fef6f5;color:#c0392b;border-left-color:#c0392b;font-weight:600}
.side-badge{
  background:#eee;color:#888;font-size:10.5px;padding:1px 6px;border-radius:8px;font-weight:500;
}
.side-item.active .side-badge{background:#fdd;color:#c0392b}

/* Content area */
.content{flex:1;min-width:0}

/* Page sections - show/hide */
.page-section{display:none}
.page-section.active{display:block}

/* ========== OVERVIEW PAGE ========== */
.overview-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
}
.overview-title{font-size:20px;font-weight:700;color:#1a1a2e}
.overview-date{font-size:12.5px;color:#999}

/* Market status banner */
.market-banner{
  background:linear-gradient(135deg,#fffbf0,#fff8e1);border:1px solid #ffe082;
  border-radius:10px;padding:14px 18px;margin-bottom:14px;
}
.market-status-label{font-size:15px;font-weight:700;color:#e65100;margin-bottom:6px}
.market-status-label span.hot{color:#c0392b}
.market-desc{font-size:12.5px;color:#666;line-height:1.7}
.market-desc strong{color:#333}

/* Stats grid - 6 boxes */
.stats-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px;
}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{
  background:#fff;border-radius:10px;padding:14px 12px;text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #eee;
}
.stat-label{font-size:11.5px;color:#999;margin-bottom:4px}
.stat-value-row{display:flex;align-items:baseline;justify-content:center;gap:4px}
.stat-value{font-size:22px;font-weight:800}
.stat-sub{font-size:11px;color:#999}
.stat-value.red{color:#e74c3c}.stat-value.green{color:#27ae60}.stat-value.orange{color:#e67e22}
.stat-value.blue{color:#2980b9}.stat-value.purple{color:#8e44ad}

/* Main theme text */
.theme-text{
  background:#fff;border-radius:10px;padding:14px 18px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);font-size:13px;line-height:1.8;color:#555;
  border-left:4px solid #c0392b;
}
.theme-text strong{color:#1a1a2e}

/* Two column layout for top lists */
.top-lists-row{display:flex;gap:14px;margin-bottom:14px}
.top-list-panel{
  flex:1;background:#fff;border-radius:10px;padding:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.panel-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.panel-title .badge{font-size:11px;color:#999;font-weight:400}
.top-list-item{
  display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f5f5f5;
  font-size:12.5px;
}
.top-list-item:last-child{border-bottom:none}
.tl-rank{width:20px;text-align:center;font-weight:700;font-size:12px;color:#999}
.tl-rank.top3{color:#e74c3c}
.tl-name{flex:1;margin-left:8px;color:#333}
.tl-code{color:#aaa;font-size:11.5px;margin-right:8px}
.tl-score{color:#e74c3c;font-weight:600;margin-right:8px}
.tl-pct{font-weight:600;font-size:12px}
.tl-pct.up{color:#e74c3c}.tl-pct.down{color:#27ae60}

/* Stock ranking table */
.ranking-table-wrap{
  background:#fff;border-radius:10px;padding:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:14px;
}
.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.table-title{font-size:14.5px;font-weight:700}
.table-info{font-size:11.5px;color:#999}
.rank-table{width:100%;border-collapse:collapse;font-size:12.5px}
.rank-table th{
  background:#fafafa;padding:8px 10px;text-align:left;font-weight:600;color:#888;
  border-bottom:2px solid #eee;font-size:12px;
}
.rank-table td{
  padding:9px 10px;border-bottom:1px solid #f5f5f5;color:#444;
}
.rank-table tr:hover td{background:#fafafa}
.tag-pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px}
.tag-blue{background:#e3f2fd;color:#1565c0}
.btn-detail{
  padding:2px 10px;border:1px solid #ddd;border-radius:10px;font-size:11px;
  cursor:pointer;background:#fff;color:#666;transition:.15s;
}
.btn-detail:hover{border-color:#c0392b;color:#c0392b}

/* ========== TEMPERATURE PAGE ========== */
.temp-toolbar{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  background:#fff;padding:12px 18px;border-radius:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap;
}
.temp-mode-btn{
  padding:6px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
  border:1px solid #ddd;background:#fff;color:#555;transition:.15s;
}
.temp-mode-btn.active{background:#e74c3c;color:#fff;border-color:#e74c3c}
.temp-date-input{
  padding:6px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;
  outline:none;width:140px;
}
.temp-filter{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#666}
.temp-filter select{
  padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12.5px;outline:none;
}
.theme-toggle{margin-left:auto;display:flex;gap:6px}
.theme-btn{
  padding:4px 12px;border-radius:14px;font-size:12px;cursor:pointer;
  border:1px solid #ddd;background:#fff;color:#666;transition:.15s;
}
.theme-btn.active{border-color:#c0392b;color:#c0392b;background:#fef6f5}

/* Chart area */
.chart-container{
  background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.chart-title{font-size:15px;font-weight:700}
.chart-legend{display:flex;gap:16px;font-size:11.5px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.chart-canvas{width:100%;height:280px}

/* Index table for temp page */
.idx-table-wrap{
  background:#fff;border-radius:10px;padding:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.idx-table{width:100%;border-collapse:collapse;font-size:13px}
.idx-table th{
  background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;color:#888;
  border-bottom:2px solid #eee;font-size:12px;cursor:pointer;user-select:none;
}
.idx-table th:hover{color:#333}
.idx-table td{padding:10px 12px;border-bottom:1px solid #f5f5f5;color:#444}
.idx-table tr:hover td{background:#fafafa}
.status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11.5px;font-weight:500}
.status-natural{background:#e8f5e9;color:#2e7d32}
.status-spring{background:#fce4ec;color:#c62828}
.status-fallback{background:#fff3e0;color:#e65100}
.status-rebound{background:#e3f2fd;color:#1565c0}

/* ========== STOCK PICKER PAGE (existing) ========== */
.page-title{font-size:20px;font-weight:700;margin-bottom:14px;color:#1a1a2e}
.tab-bar{
  display:flex;gap:0;margin-bottom:14px;background:#fff;
  border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.tab{
  flex:1;padding:11px 0;text-align:center;font-size:13.5px;font-weight:500;
  cursor:pointer;color:#666;border:none;background:#fff;transition:.2s;position:relative;
}
.tab:hover{color:#333;background:#fafafa}
.tab.active{color:#c0392b;font-weight:700;background:#fff}
.tab.active::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:#c0392b;border-radius:3px 3px 0 0;
}
.strategy-info{
  background:#fff;border-radius:10px;padding:13px 16px;
  margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);
  display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;
}
.strat-name{font-size:16px;font-weight:700;color:#1a1a2e}
.strat-meta{font-size:12px;color:#888;margin-top:2px}
.refresh-btn{
  padding:5px 14px;font-size:12px;border:1px solid #d9d9d9;
  border-radius:6px;background:#fff;color:#555;cursor:pointer;transition:.15s;white-space:nowrap;
}
.refresh-btn:hover{border-color:#c0392b;color:#c0392b}
.stock-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1100px){.stock-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.stock-grid{grid-template-columns:1fr}}
.stock-card{
  background:#fff;border-radius:10px;padding:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
  transition:transform .15s,box-shadow .15s;border:1px solid #eee;
}
.stock-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08);border-color:#ddd}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stock-name{font-size:15px;font-weight:700;color:#1a1a2e}
.stock-code{font-size:11.5px;color:#aaa;margin-left:5px}
.card-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.price-big{font-size:25px;font-weight:700;line-height:1}
.pct-chg{font-size:13.5px;font-weight:700}
.card-detail-row{
  display:flex;gap:16px;font-size:12px;color:#888;
  padding-top:7px;border-top:1px solid #f3f3f3;
}
.detail-cell label{color:#bbb;margin-right:2px}
.risk-box{
  margin-top:8px;padding:7px 9px;border-radius:6px;
  background:linear-gradient(135deg,#fff5f5,#ffeded);border:1px solid #ffdada;font-size:11.5px;line-height:1.6;
}
.risk-tag{display:inline-block;color:#c0392b;font-weight:700;margin-right:4px}
.risk-text{color:#a00}
.metrics-section{
  background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.metrics-grid{display:flex;gap:14px;flex-wrap:wrap}
.metric-card{
  flex:1;min-width:130px;background:#f8f9fb;border-radius:10px;
  padding:12px 14px;text-align:center;
}
.metric-label{font-size:12px;color:#999;margin-bottom:5px}
.metric-value{font-size:21px;font-weight:800;color:#1a1a2e}
.hidden{display:none!important}
.status-msg{padding:30px;text-align:center;color:#888;font-size:15px}
.status-info{background:#ebf5ff;color:#2980b9;padding:13px 18px;border-radius:10px;margin-bottom:14px;font-size:13.5px}
.status-warn{background:#fffaf0;color:#d35400;padding:13px 18px;border-radius:10px;margin-bottom:14px;font-size:13.5px}
.footer-risk{
  background:#fff;border-radius:10px;padding:14px 18px;
  margin-top:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);
  font-size:12px;color:#999;line-height:1.7;border-left:4px solid #e74c3c;
}
.footer-time{text-align:center;color:#bbb;font-size:12px;margin-top:10px}
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  <div class="brand" onclick="switchPage('overview')">
    <div class="brand-icon">竞</div><span>竞价选股</span>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="请输入股票名称或代码" id="searchInput" />
  </div>
  <div class="top-tags" id="topTags"></div>
</div>

<!-- ===== MAIN LAYOUT ===== -->
<div class="main-layout">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar"></aside>

<!-- Content -->
<main class="content">

<!-- ==================== PAGE: 概览首页 ==================== -->
<section class="page-section active" id="page-overview">
  <div class="overview-header">
    <h1 class="overview-title">📊 市场概览</h1>
    <span class="overview-date" id="overviewDate"></span>
  </div>

  <!-- Market status -->
  <div class="market-banner" id="marketBanner">
    <div class="market-status-label"><span class="hot">结构活跃</span> | 高位分歧</div>
    <div class="market-desc" id="marketDesc"></div>
  </div>

  <!-- Stats grid -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Theme text -->
  <div class="theme-text" id="themeText"></div>

  <!-- Two columns: latest top10 + today ranking -->
  <div class="top-lists-row">
    <div class="top-list-panel">
      <div class="panel-title">最新入Top10 <span class="badge" id="latestUpdateTime"></span></div>
      <div id="latestTop10List"></div>
    </div>
    <div class="top-list-panel">
      <div class="panel-title">今日榜单 Top10</div>
      <div id="todayRankList"></div>
    </div>
  </div>

  <!-- Full ranking table -->
  <div class="ranking-table-wrap">
    <div class="table-header">
      <span class="table-title">全市场热点股票排行</span>
      <span class="table-info" id="rankingInfo"></span>
    </div>
    <table class="rank-table" id="rankTable">
      <thead><tr>
        <th>#</th><th>代码</th><th>名称</th><th>涨跌幅</th><th>排名</th><th>评分</th><th>推荐</th><th>交易额</th><th>操作</th>
      </tr></thead>
      <tbody id="rankTableBody"></tbody>
    </table>
  </div>
</section>

<!-- ==================== PAGE: 市场温度计 ==================== -->
<section class="page-section" id="page-temp">

  <!-- Toolbar -->
  <div class="temp-toolbar">
    <button class="temp-mode-btn active" data-mode="list" onclick="setTempMode('list')">列表</button>
    <button class="temp-mode-btn" data-mode="heatmap" onclick="setTempMode('heatmap')">热力图</button>
    <input type="date" class="temp-date-input" id="tempDate" value="2026-07-10" />
    <div class="temp-filter">
      指数类型
      <select id="idxTypeFilter"><option>A股指数</option></select>
      区间涨跌
      <select id="rangeFilter"><option selected>3日涨幅</option><option>5日涨幅</option><option>10日涨幅</option></select>
      趋势状态
      <select id="trendFilter"><option selected>不限</option><option>自然反弹</option><option>次级反弹</option><option>自然回落</option><option>次级回落</option><option>自然回音</option></select>
    </div>
    <div class="theme-toggle">
      <button class="theme-btn active" onclick="setColorMode('light')">浅色模式</button>
      <button class="theme-btn" onclick="setColorMode('dark')">深色模式</button>
    </div>
  </div>

  <!-- Chart -->
  <div class="chart-container">
    <div class="chart-header">
      <span class="chart-title">众数基础指数</span>
      <div class="chart-legend">
        <span><i class="legend-dot" style="background:#26a69a"></i>大次总</span>
        <span><i class="legend-dot" style="background:#ec407a"></i>众数基础指数</span>
        <span><i class="legend-dot" style="background:#ffa726"></i>—</span>
      </div>
    </div>
    <canvas class="chart-canvas" id="tempChart"></canvas>
  </div>

  <!-- Index table -->
  <div class="idx-table-wrap">
    <table class="idx-table" id="idxTable">
      <thead><tr>
        <th>指数</th><th>趋势状态</th><th>自然涨跌 ▲</th><th>水位 ▼</th><th>强弱</th><th>3日涨幅 ▲</th>
      </tr></thead>
      <tbody id="idxTableBody"></tbody>
    </table>
  </div>
</section>

<!-- ==================== PAGE: 策略选股 ==================== -->
<section class="page-section" id="page-picker">
  <h1 class="page-title">策略选股</h1>
  <div id="pickerStatus" style="margin-bottom:14px"></div>
  <div id="pickerResult" class="hidden">

    <div class="metrics-section" id="tempSection"></div>

    <div class="tab-bar">
      <button class="tab active" data-tab="all">每日竞价推荐</button>
      <button class="tab" data-tab="top3">Top 3 精选</button>
    </div>
    <div class="strategy-info" id="strategyInfo"></div>
    <div class="stock-grid" id="stockGrid"></div>

    <div class="footer-risk">
      ⚠️ 风险提示：以上推荐仅基于集合竞价数据量化筛选，不构成任何投资建议。市场有风险，投资需谨慎。
      数据仅供参考，请结合市场环境、个人风险承受能力及投资目标审慎决策。过往表现不代表未来收益。
    </div>
    <div class="footer-time" id="footerTime"></div>
  </div>
</section>

</main>
</div>

<script>
const DATA_URL = "./data/results.json";

// ---- Sidebar items ----
const SIDEBAR_ITEMS = [
  { id:"overview", name:"首页", badge:"20", icon:"🏠" },
  { id:"hot", name:"热点跟踪", badge:"30", icon:"🔥" },
  { id:"assault", name:"猛攻榜单", badge:null, icon:"⚔️" },
  { id:"capital", name:"热门资金", badge:null, icon:"💰" },
  { id:"account", name:"账户合仓", badge:null, icon:"📂" },
  { id:"camp", name:"热点炒作营氏", badge:null, icon:"🎪" },
  { id:"watch", name:"观览竞者", badge:"11", icon:"👁️" },
  { id:"force", name:"主力追踪", badge:null, icon:"📈" },
  { id:"picker", name:"策略选股", badge:null, icon:"🎯" },
];
let currentPage = "overview";
let appData = null;

// ---- Page switching ----
function switchPage(pageId) {
  currentPage = pageId;
  document.querySelectorAll(".page-section").forEach(s => s.classList.remove("active"));
  const target = document.getElementById("page-" + pageId);
  if(target) target.classList.add("active");
  document.querySelectorAll(".side-item").forEach((el,i) => {
    el.classList.toggle("active", SIDEBAR_ITEMS[i].id === pageId);
  });
  // Render page-specific content on first visit
  if(pageId === "overview" && !window._overviewRendered) renderOverview();
  if(pageId === "temp") { renderTempChart(); renderIdxTable(); }
  if(pageId === "picker" && appData) renderPickerData(appData);
}

// ---- Render sidebar ----
function renderSidebar(){
  document.getElementById("sidebar").innerHTML = SIDEBAR_ITEMS.map((item,i) =>
    `<div class="side-item${item.id==='overview'?' active':''}" onclick="switchPage('${item.id}')">
      ${item.icon||''} ${item.name}
      ${item.badge?`<span class="side-badge">${item.badge}</span>`:''}
    </div>`
  ).join("");
}

// ---- Top tags ----
function renderTopTags(){
  const tags = ["热点","竞争激战","题区","空间赛道","航天机电","弱势跟涨","弱势跟空","红白破盘","情绪资金","金融","金属"];
  document.getElementById("topTags").innerHTML = tags.map((t,i) =>

// Draw chart with Canvas
function renderTempChart(){
  const canvas = document.getElementById("tempChart");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr,dpr);

  const W = rect.width, H = rect.height;
  const pad = {t:20,r:40,b:30,l:50};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;

  // Clear
  ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);

  // Generate demo data (simulating the screenshot's multi-line pattern)
  const points = 120;
  let line1=[],line2=[],line3=[];
  let v1=0,v2=0,v3=0;
  for(let i=0;i<points;i++){
    v1 += (Math.random()-0.48)*8; v1 = Math.max(-80,Math.min(120,v1));
    v2 += (Math.random()-0.45)*6; v2 = Math.max(-60,Math.min(100,v2));
    v3 += (Math.random()-0.5)*4; v3 = Math.max(-40,Math.min(60,v3));
    line1.push(v1);line2.push(v2);line3.push(v3);
  }

  // Grid
  ctx.strokeStyle="#f0f0f0";ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=pad.t+cH*(1-i/5);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle="#999";ctx.font="11px sans-serif";ctx.textAlign="right";
    ctx.fillText((i*50-50).toString(),pad.l-6,y+4);
  }
  // Date labels
  ctx.textAlign="center";
  const dateLabels=["2023-07-10","","","","","","","","2026-07-10"];
  dateLabels.forEach((lbl,i)=>{
    const x=pad.l+(cW*i/(dateLabels.length-1));
    ctx.fillText(lbl,x,H-8);
  });

  function drawLine(data,color){
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();
    data.forEach((v,i)=>{
      const x=pad.l+(cW*(i/(data.length-1)));
      const y=pad.t+cH*((50-v)/150);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  drawLine(line3,"#ffa726"); // — baseline
  drawLine(line1,"#26a69a"); // 大次总 teal
  drawLine(line2,"#ec407a"); // 众数基础 pink

  // Y-axis right side labels
  const lastVals=[line1[points-1],line2[points-1],line3[points-1]];
  const rLabels=[{v:lastVals[0].toFixed(2),c:"#26a69a"},{v:lastVals[1].toFixed(2)+"%",c:"#ec407a"},{v:lastVals[2].toFixed(2)+"%",c:"#ffa726"}];
  ctx.textAlign="left";
  rLabels.forEach((rl,i)=>{ctx.fillStyle=rl.c;ctx.font="bold 12px sans-serif";ctx.fillText(rl.v,W-pad.r+4,pad.t+16+i*18)});
}

function renderStockCards(data){
  const stocks=currentPickerTab==="all"?(data.all||[]):(data.top3||[]);
  if(!stocks||stocks.length===0){document.getElementById("stockGrid").innerHTML='<div class="status-msg">当前条件下暂无符合条件的个股。</div>';return;}
  document.getElementById("stockGrid").innerHTML=stocks.map(s=>{
    const price=s["买入价"]??s["开盘价"]??0;
    const pct=s["开盘涨幅%"]??0;
    const score=s["动能评分"]??"-";
    const volRatio=s["量比"]?? "-";
    const level=s["买入程度"]||"谨慎";
    const isHot=score>=50&&typeof score==="number";
    return`<div class="stock-card">
      <div class="card-head">
        <span class="stock-name">${s["名称"]}<span class="stock-code">${s["代码"]}</span>${
          isHot?'<span style="font-size:10.5px;background:#e74c3c;color:#fff;padding:1px 5px;border-radius:4px;margin-left:4px;">热</span>':''
        }</span>
      </div>
      <div class="card-price-row">
        <span class="price-big" style="color:${priceColor(pct)}">${Number(price).toFixed(2)}</span>
        <span class="pct-chg ${pctClass(pct)}">${pct>0?'+':''}${Number(pct).toFixed(2)}%</span>
      </div>
      <div class="card-detail-row">
        <span class="detail-cell">昨收 <span style="color:#333">${s["止盈价"]?(price*0.9524).toFixed(2):'-'}</span></span>
        <span class="detail-cell">今开 <span style="color:#333">${price}</span></span>
      </div>
      <div class="card-detail-row">
        <span class="detail-cell">评分 <span style="color:#333">${score}</span></span>
        <span class="detail-cell">量比 <span style="color:#333">${volRatio}</span></span>
      </div>
      <div class="risk-box">
        <span class="risk-tag">${level==="不推荐"?"禁购":"关注"}</span>
        <span class="risk-text">${
          level==="不推荐"
            ?`动能评分较低(${score}分)，暂不建议介入；如需操作请严格控制仓位。`
            :`日涨幅${pct}% | 量比${volRatio} | 止盈价${s["止盈价"]||'-'} | 止损价${s["止损价"]||'-'}`
        }</span>
      </div>
    </div>`}).join("");
}

function showStatus(msg,type){
  const el=document.getElementById("pickerStatus");
  el.innerHTML?type?el.innerHTML=`<div class="status-${type}">${msg}</div>`:el.innerHTML=`<div class="status-msg">${msg}</div>`:el.innerHTML="";

// ---- Load data ----
async function loadData(){
  showStatus("⏳ 正在加载最新选股结果…","info");
  try{
    const resp=await fetch(DATA_URL+"?t="+Date.now());
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    const data=await resp.json();
    app=data;
    if(currentPage==="picker")renderPickerData(data);
    showStatus("","");
  }catch(e){
    showStatus("⚠️ 无法获取实时数据（"+e.message+"）","warn");
  }
}
