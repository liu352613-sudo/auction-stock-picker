name: 竞价选股每日自动生成

# 触发条件：
#   1. 定时：每个工作日北京时间 09:26（集合竞价结束后）自动运行
#      GitHub cron 使用 UTC，北京时间 = UTC + 8，故 09:26(北京) = 01:26(UTC)
#      注意：GitHub Actions 定时任务在高峰期可能延迟数分钟，属正常现象
#   2. 手动：在 Actions 页面点击 "Run workflow" 可随时手动触发
on:
  schedule:
    - cron: "26 1 * * 1-5"   # 周一至周五 UTC 01:26 = 北京 09:26
  workflow_dispatch:          # 允许手动触发

# 授予对仓库内容的写权限，用于把生成的数据 commit 回仓库
permissions:
  contents: write

# 同一时刻只允许一个实例运行，避免并发推送冲突
concurrency:
  group: daily-auction
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_SINA: "1"          # GitHub Actions 环境东财不可达，强制走新浪数据源

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-local.txt

      - name: 判断今日是否交易日（非交易日则跳过）
        id: tradecheck
        run: |
          python - <<'PY'
          import sys, os, datetime
          sys.path.insert(0, "src")
          from trading_calendar import is_trading_day
          # 以北京时间判断当天
          now = datetime.datetime.utcnow() + datetime.timedelta(hours=8)
          today = now.date()
          trading = is_trading_day(today)
          print(f"北京日期 {today} 是否交易日: {trading}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"is_trading={'true' if trading else 'false'}\n")
          PY

      - name: 生成今日真实推荐数据
        if: steps.tradecheck.outputs.is_trading == 'true'
        run: |
          python generate_results.py

      - name: 提交并推送结果
        if: steps.tradecheck.outputs.is_trading == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json data/history_index.json data/history/ data/klines/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "没有数据变化，跳过提交。"
          else
            BJ=$(date -u -d '+8 hours' '+%Y-%m-%d %H:%M')
            git commit -m "自动生成：${BJ} 竞价选股结果（GitHub Actions）"
            git push origin HEAD:main
            echo "已推送今日数据，EdgeOne 将自动同步。"
          fi

      - name: 非交易日说明
        if: steps.tradecheck.outputs.is_trading != 'true'
        run: echo "今天不是 A 股交易日（周末/节假日），已跳过数据生成。"
